<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FNDM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Pretendard',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
 
.page{width:100%;max-width:640px;padding:48px 24px;text-align:center;display:flex;flex-direction:column;align-items:center}
 
/* Lang */
.lang{position:fixed;top:20px;right:24px;display:flex;gap:4px;z-index:100}
.lang button{
  padding:5px 12px;font-family:'Pretendard',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.5px;border:1px solid #333;background:transparent;
  color:#555;cursor:pointer;border-radius:4px;transition:all .15s;
}
.lang button.on{background:#fff;color:#000;border-color:#fff}
 
/* ===== FNDM VIDEO TEXT ===== */
.fndm-text{
  position:relative;
  width:100%;
  height:clamp(80px,16vw,140px);
  margin-bottom:32px;
  overflow:hidden;
}
.fndm-text img{
  position:absolute;
  inset:0;
  width:100%;height:100%;
  object-fit:cover;
}
.fndm-text svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  z-index:2;
}
 
/* ===== HERO TEXT — bold, punchy ===== */
.hero-title{
  font-size:clamp(32px,6.5vw,52px);
  font-weight:900;
  line-height:1.2;
  letter-spacing:-0.5px;
  color:#fff;
  margin-bottom:14px;
}
.hero-sub{
  font-size:clamp(14px,2.2vw,17px);
  color:rgba(255,255,255,.65);
  font-weight:400;
  line-height:1.6;
}
.hero-sub strong{color:#fff;font-weight:700}
 
/* ===== CARDS ===== */
.cards{display:flex;gap:10px;margin-top:44px;width:100%}
.card{
  flex:1;padding:22px 14px;
  border:1px solid #1e1e1e;border-radius:12px;
  background:#111;
  cursor:pointer;transition:all .2s;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.card:hover{border-color:#333;background:#161616}
.card.on{border-color:#fff;background:#161616}
.card-icon{font-size:28px;line-height:1}
.card-name{font-size:12px;font-weight:600;color:#ccc;letter-spacing:.5px}
 
/* ===== FORM ===== */
.form-section{margin-top:40px;width:100%}
.form-row{display:flex;gap:10px}
.form-input{
  flex:1;padding:16px 20px;
  border:1px solid #2a2a2a;border-radius:10px;
  background:#111;
  font-family:'Pretendard',sans-serif;font-size:14px;
  color:#fff;outline:none;transition:border-color .2s;
}
.form-input::placeholder{color:rgba(255,255,255,.35);font-weight:500}
.form-input:focus{border-color:#555}
.form-btn{
  padding:16px 32px;border:none;border-radius:10px;
  background:#fff;
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;
  color:#000;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.form-btn:hover{background:#e0e0e0}
.form-btn:active{background:#ccc;transform:scale(.98)}
.form-btn:disabled{background:#444;color:#777;cursor:not-allowed}
 
/* ===== MSG ===== */
.msg{display:none;margin-top:40px;text-align:center}
.msg.show{display:block;animation:fadeIn .3s ease-out}
.msg-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#fff}
.msg-sub{font-size:14px;color:rgba(255,255,255,.5)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
 
/* ===== FOOTER ===== */
.footer{margin-top:60px;font-size:11px;font-weight:500;color:#555;letter-spacing:.5px}
.footer span{color:#888}
 
/* ===== MOBILE ===== */
@media(max-width:520px){
  .cards{flex-direction:column;gap:8px}
  .card{flex-direction:row;padding:18px 16px;border-radius:10px}
  .card-icon{font-size:24px}
  .form-row{flex-direction:column;gap:8px}
  .form-btn{text-align:center;border-radius:10px}
  .lang{top:14px;right:16px}
}
</style>
</head>
<body>
 
<div class="lang">
  <button onclick="setLang('ko')" data-l="ko">KR</button>
  <button class="on" onclick="setLang('en')" data-l="en">EN</button>
</div>
 
<div class="page">
 
  <!-- FNDM with bg.avif + white stroke -->
  <div class="fndm-text">
    <img src="./bg.avif" alt="">
    <svg viewBox="0 0 480 140" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <mask id="m">
          <rect width="100%" height="100%" fill="white"/>
          <text x="50%" y="53%" text-anchor="middle" dominant-baseline="central"
            font-family="'Pretendard',sans-serif" font-weight="900"
            font-size="150" letter-spacing="2" fill="black"
            stroke="black" stroke-width="1">FNDM</text
          <line x1="100" y1="15" x2="442" y2="125" stroke="black" stroke-width="0.8"/>
        </mask>
      </defs>
      <rect width="100%" height="100%" fill="#0a0a0a" mask="url(#m)"/>
      <text x="50%" y="53%" text-anchor="middle" dominant-baseline="central"
        font-family="'Pretendard',sans-serif" font-weight="900"
        font-size="150" letter-spacing="2"
        fill="none" stroke="rgba(255,255,255,.15)" stroke-width="2">FNDM</text>
    </svg>
  </div>
 
  <h1 class="hero-title" data-ko="너의 팬심을 위한&#10;첫 알람" data-en="THE FIRST ALERT&#10;FOR YOUR FAN LIFE">THE FIRST ALERT<br>FOR YOUR FAN LIFE</h1>
  <p class="hero-sub" data-ko="<strong>콘텐츠</strong>도, <strong>드롭 상품</strong>도 내가 찾는 모든 IP굿즈는 <strong>FNDM</strong> 에서." data-en="Be the first to get <strong>content</strong> and <strong>drops</strong>." data-html="true">Be the first to get <strong>content</strong> and <strong>drops</strong>.</p>
 
  <div class="cards" id="cardsWrap">
    <div class="card" onclick="pick(this)" data-v="ANIME">
      <span class="card-icon">🃏</span>
      <div class="card-name">TRADING CARD</div>
    </div>
    <div class="card" onclick="pick(this)" data-v="GAMES">
      <span class="card-icon">🤖</span>
      <div class="card-name">ANIME Figure Collection</div>
    </div>
    <div class="card" onclick="pick(this)" data-v="FIGURES">
      <span class="card-icon">🎮</span>
      <div class="card-name">SUBCULTURE GAMES</div>
    </div>
  </div>
 
  <form class="form-section" id="signupForm" action="https://formspree.io/f/mojkbagr" method="POST">
    <input type="hidden" name="_subject" value="FNDM New Signup">
    <input type="hidden" name="interests" id="interestsField" value="">
    <div class="form-row">
      <input class="form-input" type="email" name="email" id="emailIn"
        placeholder="Register for alerts" required>
      <button class="form-btn" type="submit" id="submitBtn">Get Alerts</button>
    </div>
  </form>
 
  <div class="msg" id="successMsg">
    <div class="msg-title" data-ko="등록 완료" data-en="You're in">You're in</div>
    <div class="msg-sub" data-ko="가장 먼저 알림을 보내드릴게요." data-en="We'll alert you first.">We'll alert you first.</div>
    <div class="msg-countdown" id="countdown" style="margin-top:20px;font-size:32px;font-weight:900;color:#fff;opacity:0;transition:opacity .3s"></div>
  </div>
 
  <div class="msg" id="errorMsg">
    <div class="msg-title">Oops</div>
    <div class="msg-sub" data-ko="다시 시도해 주세요." data-en="Please try again.">Please try again.</div>
  </div>
 
  <div class="footer">For the Real Ones. <span>CultureCode</span></div>
</div>
 
<script>
let lang='en';
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  document.querySelectorAll('[data-ko]').forEach(e=>{
    const txt=e.getAttribute('data-'+l);
    if(e.tagName==='H1'||e.hasAttribute('data-html')){e.innerHTML=txt.replace(/\n/g,'<br>')}
    else{e.textContent=txt}
  });
}
 
const sel=new Set();
function pick(c){
  const v=c.dataset.v;
  if(sel.has(v)){sel.delete(v);c.classList.remove('on')}
  else{sel.add(v);c.classList.add('on')}
  document.getElementById('interestsField').value=[...sel].join(', ');
}
 
// Check if already registered
const registered = localStorage.getItem('fndm_registered');
if(registered){
  document.getElementById('signupForm').style.display='none';
  document.getElementById('cardsWrap').style.display='none';
}
 
document.getElementById('signupForm').addEventListener('submit',async function(e){
  e.preventDefault();
  if(localStorage.getItem('fndm_registered'))return;
  const btn=document.getElementById('submitBtn');
  const email=document.getElementById('emailIn').value.trim();
  if(!email)return;
  btn.disabled=true;btn.textContent='...';
  try{
    const res=await fetch(this.action,{
      method:'POST',
      headers:{'Accept':'application/json','Content-Type':'application/json'},
      body:JSON.stringify({
        email:email,
        interests:document.getElementById('interestsField').value||'None',
        timestamp:new Date().toISOString(),
        _subject:'FNDM Signup — '+email
      })
    });
    if(res.ok){
      localStorage.setItem('fndm_registered','true');
      this.style.display='none';
      document.getElementById('cardsWrap').style.display='none';
      document.getElementById('successMsg').classList.add('show');
 
      // 5초 대기 후 3,2,1 카운트다운
      setTimeout(()=>{
        const cd=document.getElementById('countdown');
        cd.style.opacity='1';
        let count=3;
        cd.textContent=count;
        const timer=setInterval(()=>{
          count--;
          if(count>0){cd.textContent=count}
          else{
            clearInterval(timer);
            cd.textContent='';
            document.getElementById('successMsg').classList.remove('show');
            document.getElementById('successMsg').style.display='none';
          }
        },1000);
      },5000);
 
    }else throw new Error();
  }catch(err){
    document.getElementById('errorMsg').classList.add('show');
    btn.disabled=false;btn.textContent='Get Alerts';
  }
});
</script>
</body>
</html>
